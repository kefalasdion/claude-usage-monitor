<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Usage Monitor</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header>
      <img src="../icons/icon48.png" alt="Claude" class="logo" />
      <h1>Claude Usage</h1>
    </header>

    <div id="state-loading" class="state">
      <p class="muted">Waiting for data&hellip;</p>
      <p class="hint">Open <a href="https://claude.ai" target="_blank">claude.ai</a> while logged in.</p>
    </div>

    <div id="state-data" class="state hidden">
      <div class="plan-badge" id="plan-name">Pro</div>

      <div class="usage-numbers">
        <span id="used">—</span>
        <span class="sep">/</span>
        <span id="limit">—</span>
        <span class="label">messages</span>
      </div>

      <div class="progress-track">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="progress-pct" id="progress-pct">0%</div>

      <div class="meta-row">
        <span class="meta-label">Resets</span>
        <span class="meta-value" id="resets-at">—</span>
      </div>
      <div class="meta-row">
        <span class="meta-label">Updated</span>
        <span class="meta-value" id="updated-at">—</span>
      </div>
    </div>

    <footer>
      <button id="btn-refresh" title="Refresh now">&#x21bb; Refresh</button>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
