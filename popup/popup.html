<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Usage Monitor</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <header>
      <img src="../icons/icon48.png" alt="Claude" class="logo" />
      <div class="header-text">
        <h1>Claude Usage</h1>
        <span class="plan-badge" id="plan-name">—</span>
      </div>
    </header>

    <!-- No data yet -->
    <div id="state-loading" class="state">
      <p class="muted">Waiting for data…</p>
      <p class="hint">Open <a href="https://claude.ai" target="_blank">claude.ai</a> while logged in.</p>
    </div>

    <!-- Data available -->
    <div id="state-data" class="state hidden">

      <!-- 5-hour window -->
      <div class="window-block">
        <div class="window-header">
          <span class="window-label">5-hour window</span>
          <span class="window-pct" id="pct-5h">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-bar" id="bar-5h"></div>
        </div>
        <div class="window-reset">
          Resets <span id="reset-5h">—</span>
        </div>
      </div>

      <!-- 7-day window -->
      <div class="window-block">
        <div class="window-header">
          <span class="window-label">7-day window</span>
          <span class="window-pct" id="pct-7d">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-bar" id="bar-7d"></div>
        </div>
        <div class="window-reset">
          Resets <span id="reset-7d">—</span>
        </div>
      </div>

      <!-- 7-day Sonnet (shown only when non-null) -->
      <div class="window-block" id="sonnet-block" style="display:none">
        <div class="window-header">
          <span class="window-label">7-day Sonnet</span>
          <span class="window-pct" id="pct-sonnet">0%</span>
        </div>
        <div class="progress-track">
          <div class="progress-bar" id="bar-sonnet"></div>
        </div>
        <div class="window-reset">
          Resets <span id="reset-sonnet">—</span>
        </div>
      </div>

      <div class="meta-row">
        <span class="meta-label">Last updated</span>
        <span class="meta-value" id="updated-at">—</span>
      </div>
    </div>

    <footer>
      <button id="btn-refresh" title="Refresh now">↻ Refresh</button>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
